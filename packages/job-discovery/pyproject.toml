[project]
name = "hamster-job-discovery"
version = "0.1.0"
description = "Fetch job listings from ATS public APIs (Greenhouse, Lever, Ashby, Workable)"
requires-python = ">=3.12"
dependencies = [
    "hamster-shared",
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hamster/job_discovery"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.hatch.build.targets.wheel.force-include]
"src/hamster/job_discovery/companies.yaml" = "hamster/job_discovery/companies.yaml"
