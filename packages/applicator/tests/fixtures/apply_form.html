<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Test Application Form</title>
</head>
<body>
  <h1>Apply for this role</h1>
  <form id="apply-form">
    <label for="first-name">First Name</label>
    <input id="first-name" name="firstName" type="text" required />

    <label for="last-name">Last Name</label>
    <input id="last-name" name="lastName" type="text" required />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel" />

    <label>
      Years of experience
      <select id="experience" name="experience">
        <option value="0-1">0-1 years</option>
        <option value="1-3">1-3 years</option>
        <option value="3-5">3-5 years</option>
        <option value="5+">5+ years</option>
      </select>
    </label>

    <label>
      Cover letter
      <textarea id="cover-letter" name="coverLetter" rows="4"></textarea>
    </label>

    <label for="resume">Upload resume</label>
    <input id="resume" name="resume" type="file" accept=".pdf" />

    <label>
      <input id="sponsorship" name="sponsorship" type="checkbox" />
      I require visa sponsorship
    </label>

    <!-- react-select-style combobox: options render only after opening,
         mirroring Greenhouse's real widget so tests exercise the real path. -->
    <div class="select-wrapper">
      <span id="relocation-label" class="label">Are you open to relocation?</span>
      <div class="select__control">
        <div class="select__input-container">
          <input
            id="relocation"
            class="select__input"
            role="combobox"
            type="text"
            aria-haspopup="true"
            aria-autocomplete="list"
            aria-expanded="false"
            aria-labelledby="relocation-label"
            aria-required="true"
            autocomplete="off"
          />
        </div>
        <!-- react-select's hidden validation mirror: must be ignored by the
             extractor (aria-hidden, tabindex=-1, no label, no id). -->
        <input
          class="requiredInput"
          type="text"
          required
          tabindex="-1"
          aria-hidden="true"
          value=""
        />
        <span class="select__value" data-value=""></span>
      </div>
    </div>

    <!-- intl-tel-input's internal country SEARCH box: role=combobox but NOT a
         react-select question (no 'select__input' class, no '.select__menu').
         The extractor must NOT treat this as a fillable combobox. -->
    <input
      id="iti-0__search-input"
      type="text"
      role="combobox"
      aria-label="Search"
      aria-autocomplete="list"
      autocomplete="off"
    />

    <button type="submit">Submit Application</button>
  </form>

  <script>
    // Minimal react-select emulation: clicking the combobox input renders an
    // option menu; clicking an option writes the value back and removes the
    // menu. Matches the DOM contract our extractor/executor target.
    (function () {
      const OPTIONS = ["Yes", "No", "Prefer not to say"];
      const input = document.getElementById("relocation");
      const control = input.closest(".select__control");
      const valueSpan = control.querySelector(".select__value");

      function closeMenu() {
        const menu = control.querySelector(".select__menu");
        if (menu) menu.remove();
        input.setAttribute("aria-expanded", "false");
      }

      function openMenu() {
        if (control.querySelector(".select__menu")) return;
        const menu = document.createElement("div");
        menu.className = "select__menu";
        OPTIONS.forEach((text) => {
          const opt = document.createElement("div");
          opt.className = "select__option";
          opt.setAttribute("role", "option");
          opt.textContent = text;
          opt.addEventListener("mousedown", (event) => {
            event.preventDefault();
            valueSpan.textContent = text;
            valueSpan.setAttribute("data-value", text);
            input.value = text;
            closeMenu();
          });
          menu.appendChild(opt);
        });
        control.appendChild(menu);
        input.setAttribute("aria-expanded", "true");
      }

      input.addEventListener("click", openMenu);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeMenu();
      });
    })();
  </script>
</body>
</html>
