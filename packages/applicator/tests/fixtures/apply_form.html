<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Test Application Form</title>
</head>
<body>
  <h1>Apply for this role</h1>
  <form id="apply-form">
    <label for="first-name">First Name</label>
    <input id="first-name" name="firstName" type="text" required />

    <label for="last-name">Last Name</label>
    <input id="last-name" name="lastName" type="text" required />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel" />

    <label>
      Years of experience
      <select id="experience" name="experience">
        <option value="0-1">0-1 years</option>
        <option value="1-3">1-3 years</option>
        <option value="3-5">3-5 years</option>
        <option value="5+">5+ years</option>
      </select>
    </label>

    <label>
      Cover letter
      <textarea id="cover-letter" name="coverLetter" rows="4"></textarea>
    </label>

    <label for="resume">Upload resume</label>
    <input id="resume" name="resume" type="file" accept=".pdf" />

    <label>
      <input id="sponsorship" name="sponsorship" type="checkbox" />
      I require visa sponsorship
    </label>

    <button type="submit">Submit Application</button>
  </form>
</body>
</html>
