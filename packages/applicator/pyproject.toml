[project]
name = "hamster-applicator"
version = "0.1.0"
description = "Browser automation + local LLM form filling for ATS application pages"
requires-python = ">=3.12"
dependencies = [
    "hamster-shared",
    "playwright>=1.47",
    "llama-cpp-python>=0.3",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hamster/applicator"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
