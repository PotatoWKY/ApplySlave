[project]
name = "applyslave-shared"
version = "0.1.0"
description = "Shared data models and protocol definitions for ApplySlave"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/applyslave/shared"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
