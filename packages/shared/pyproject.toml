[project]
name = "hamster-shared"
version = "0.1.0"
description = "Shared data models and protocol definitions for Hamster"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hamster/shared"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
