[project]
name = "hamster-orchestrator"
version = "0.1.0"
description = "State machine, job queue, retry handler, result logger"
requires-python = ">=3.12"
dependencies = [
    "hamster-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hamster/orchestrator"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
