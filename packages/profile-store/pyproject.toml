[project]
name = "hamster-profile-store"
version = "0.1.0"
description = "Resume and profile storage for Hamster"
requires-python = ">=3.12"
dependencies = [
    "hamster-shared",
    "pdfplumber>=0.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hamster/profile_store"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
