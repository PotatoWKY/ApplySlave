[project]
name = "applyslave-profile-store"
version = "0.1.0"
description = "Resume and profile storage for ApplySlave"
requires-python = ">=3.12"
dependencies = [
    "applyslave-shared",
    "pdfplumber>=0.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/applyslave/profile_store"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
