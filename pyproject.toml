# Root workspace manifest. This project has no code itself;
# it only declares the workspace members and shared tooling config.

[tool.uv.workspace]
members = [
    "packages/shared",
    "packages/profile-store",
    "packages/job-discovery",
    "packages/applicator",
    "packages/orchestrator",
    "services/backend",
]

[tool.uv.sources]
applyslave-shared = { workspace = true }
applyslave-profile-store = { workspace = true }
applyslave-job-discovery = { workspace = true }
applyslave-applicator = { workspace = true }
applyslave-orchestrator = { workspace = true }
applyslave-backend = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "pyright>=1.1",
    "reportlab>=4.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
testpaths = [
    "packages/shared/tests",
    "packages/profile-store/tests",
    "packages/job-discovery/tests",
    "packages/applicator/tests",
    "packages/orchestrator/tests",
    "services/backend/tests",
]
asyncio_mode = "auto"
